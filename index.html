<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Semester App</title>

    <!-- 🎨 Styles -->
    <link rel="stylesheet" href="styles/main.css">

    <!-- 📅 FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>

<body>

<!-- ==========================================
     🧭 HEADER
========================================== -->
<header style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
    <h2>📅 Semester App</h2>

    <div>
        <span id="currentUser"></span>
        <button onclick="logout()">Logga ut</button>
    </div>
</header>

<!-- ==========================================
     🎛️ CONTROLS
========================================== -->
<section style="padding:10px; display:flex; gap:10px; flex-wrap:wrap;">

    <!-- 👥 Add employee -->
    <input type="text" id="employeeName" placeholder="Ny anställd">
    <button onclick="addEmployee()">Lägg till</button>

    <!-- 📅 Create vacation (form fallback) -->
    <select id="employeeSelect"></select>
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="addVacation()">Spara</button>

    <!-- 🔍 Filter -->
    <select id="filter" onchange="renderCalendar()"></select>

</section>

<!-- ==========================================
     📅 CALENDAR
========================================== -->
<div id="calendar" style="padding:10px;"></div>

<!-- ==========================================
     📅 CREATE VACATION MODAL
========================================== -->
<div id="vacationModal" class="modal">
  <div class="modal-content">
    <h3>Skapa semester</h3>

    <label>Anställd</label>
    <select id="modalEmployee"></select>

    <label>Start</label>
    <input type="date" id="modalStart">

    <label>Slut</label>
    <input type="date" id="modalEnd">

    <div style="margin-top:10px;">
      <button class="btn-primary" onclick="submitVacationModal()">Spara</button>
      <button class="btn-secondary" onclick="closeModal()">Avbryt</button>
    </div>
  </div>
</div>

<!-- ==========================================
     ✏️ EDIT VACATION MODAL
========================================== -->
<div id="editVacationModal" class="modal">
  <div class="modal-content">
    <h3>Redigera semester</h3>

    <input type="hidden" id="editVacationId">

    <label>Anställd</label>
    <select id="editEmployee"></select>

    <label>Start</label>
    <input type="date" id="editStart">

    <label>Slut</label>
    <input type="date" id="editEnd">

    <div style="margin-top:10px;">
      <button class="btn-primary" onclick="submitEditVacation()">Spara</button>
      <button class="btn-secondary" onclick="closeModal()">Avbryt</button>
    </div>
  </div>
</div>

<!-- ==========================================
     🔔 TOAST CONTAINER (optional)
========================================== -->
<div id="toastContainer"></div>

<!-- ==========================================
     ⏳ LOADING OVERLAY (nice)
========================================== -->
<div id="loadingOverlay" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.3);
    align-items:center;
    justify-content:center;
    color:white;
    font-size:20px;
">
    Laddar...
</div>

<!-- ==========================================
     📦 SCRIPTS (ORDNING VIKTIG)
========================================== -->

<!-- 🔧 Core -->
<script src="src/core/storage.js"></script>

<!-- 🔐 Auth -->
<script src="src/features/auth/authService.js"></script>

<!-- 👥 Employees -->
<script src="src/features/employees/employeesService.js"></script>

<!-- 📅 Vacations -->
<script src="src/features/vacations/vacationsService.js"></script>

<!-- 🪟 UI -->
<script src="src/shared/ui.js"></script>

<!-- 📅 Calendar -->
<script src="src/features/calendar/calendar.js"></script>

<!-- 🚀 App -->
<script src="src/app.js"></script>

<!-- 📅 FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

</body>
</html>
